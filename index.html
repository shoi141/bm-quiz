<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ビジネスマネージャー検定 学習アプリ</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;600;700&family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --navy: #0f1e35;
    --navy2: #172a4a;
    --gold: #c9a84c;
    --gold-light: #e8c97a;
    --cream: #f5f0e8;
    --white: #ffffff;
    --text: #1a1a2e;
    --muted: #6b7280;
    --correct: #16a34a;
    --wrong: #dc2626;
    --correct-bg: #f0fdf4;
    --wrong-bg: #fef2f2;
    --shadow: 0 4px 24px rgba(15,30,53,0.13);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Sans JP', sans-serif;
    background: var(--cream);
    color: var(--text);
    min-height: 100vh;
  }

  /* ===== HEADER ===== */
  header {
    background: var(--navy);
    padding: 18px 32px;
    display: flex;
    align-items: center;
    gap: 16px;
    box-shadow: 0 2px 16px rgba(0,0,0,0.3);
    position: sticky; top: 0; z-index: 100;
  }
  header .logo {
    font-family: 'Noto Serif JP', serif;
    font-size: 1.15rem;
    color: var(--gold);
    letter-spacing: 0.05em;
    font-weight: 700;
  }
  header .sub {
    color: rgba(255,255,255,0.5);
    font-size: 0.75rem;
    letter-spacing: 0.1em;
  }
  header .spacer { flex: 1; }
  header .score-badge {
    background: rgba(201,168,76,0.15);
    border: 1px solid var(--gold);
    color: var(--gold);
    padding: 5px 14px;
    border-radius: 20px;
    font-size: 0.82rem;
    font-weight: 700;
    display: none;
  }

  /* ===== SCREENS ===== */
  .screen { display: none; animation: fadeUp 0.35s ease; }
  .screen.active { display: block; }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(14px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ===== HOME ===== */
  #home {
    max-width: 820px;
    margin: 0 auto;
    padding: 48px 24px 80px;
  }
  .hero {
    text-align: center;
    margin-bottom: 44px;
  }
  .hero h1 {
    font-family: 'Noto Serif JP', serif;
    font-size: 2rem;
    color: var(--navy);
    margin-bottom: 10px;
    line-height: 1.4;
  }
  .hero h1 span { color: var(--gold); }
  .hero p {
    color: var(--muted);
    font-size: 0.9rem;
    line-height: 1.8;
  }

  .section-title {
    font-family: 'Noto Serif JP', serif;
    font-size: 1rem;
    color: var(--navy);
    margin-bottom: 16px;
    padding-left: 10px;
    border-left: 3px solid var(--gold);
  }

  .category-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 14px;
    margin-bottom: 36px;
  }

  .cat-card {
    background: var(--white);
    border: 2px solid transparent;
    border-radius: 12px;
    padding: 20px 18px;
    cursor: pointer;
    transition: all 0.22s ease;
    box-shadow: var(--shadow);
    position: relative;
    overflow: hidden;
  }
  .cat-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: var(--gold);
    transform: scaleX(0);
    transition: transform 0.22s ease;
  }
  .cat-card:hover {
    border-color: var(--gold);
    transform: translateY(-3px);
    box-shadow: 0 8px 32px rgba(15,30,53,0.18);
  }
  .cat-card:hover::before { transform: scaleX(1); }
  .cat-card .icon { font-size: 1.7rem; margin-bottom: 10px; }
  .cat-card .name {
    font-weight: 700;
    font-size: 0.92rem;
    color: var(--navy);
    margin-bottom: 4px;
  }
  .cat-card .count {
    font-size: 0.78rem;
    color: var(--muted);
  }
  .cat-card .progress-bar {
    margin-top: 10px;
    height: 4px;
    background: #e5e7eb;
    border-radius: 2px;
    overflow: hidden;
  }
  .cat-card .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--gold), var(--gold-light));
    border-radius: 2px;
    transition: width 0.4s ease;
  }

  .btn-all {
    display: block;
    width: 100%;
    padding: 16px;
    background: var(--navy);
    color: var(--gold);
    border: 2px solid var(--navy);
    border-radius: 12px;
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 1rem;
    font-weight: 700;
    cursor: pointer;
    letter-spacing: 0.05em;
    transition: all 0.22s ease;
    margin-bottom: 12px;
  }
  .btn-all:hover {
    background: var(--navy2);
    box-shadow: 0 4px 20px rgba(15,30,53,0.3);
    transform: translateY(-2px);
  }

  .btn-review {
    display: block;
    width: 100%;
    padding: 14px;
    background: transparent;
    color: var(--navy);
    border: 2px solid var(--navy);
    border-radius: 12px;
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 0.95rem;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.22s ease;
  }
  .btn-review:hover {
    background: var(--navy);
    color: var(--gold);
  }

  /* ===== QUIZ ===== */
  #quiz {
    max-width: 740px;
    margin: 0 auto;
    padding: 36px 24px 80px;
  }

  .quiz-header {
    margin-bottom: 28px;
  }
  .quiz-meta {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 14px;
    flex-wrap: wrap;
  }
  .cat-tag {
    background: var(--navy);
    color: var(--gold);
    font-size: 0.75rem;
    font-weight: 700;
    padding: 4px 12px;
    border-radius: 20px;
    letter-spacing: 0.06em;
  }
  .q-counter {
    color: var(--muted);
    font-size: 0.83rem;
  }
  .progress-track {
    height: 6px;
    background: #e5e7eb;
    border-radius: 3px;
    overflow: hidden;
  }
  .progress-fill-quiz {
    height: 100%;
    background: linear-gradient(90deg, var(--gold), var(--gold-light));
    border-radius: 3px;
    transition: width 0.4s ease;
  }

  .question-box {
    background: var(--white);
    border-radius: 16px;
    padding: 28px 28px 24px;
    box-shadow: var(--shadow);
    margin-bottom: 20px;
  }
  .question-text {
    font-family: 'Noto Serif JP', serif;
    font-size: 1.08rem;
    line-height: 1.9;
    color: var(--navy);
    margin-bottom: 6px;
  }

  .choices {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .choice-btn {
    background: var(--cream);
    border: 2px solid #e5e7eb;
    border-radius: 10px;
    padding: 14px 18px;
    text-align: left;
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 0.92rem;
    cursor: pointer;
    transition: all 0.18s ease;
    display: flex;
    align-items: center;
    gap: 12px;
    color: var(--text);
    line-height: 1.6;
  }
  .choice-btn .choice-label {
    min-width: 26px;
    height: 26px;
    border-radius: 50%;
    background: #e5e7eb;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.75rem;
    font-weight: 700;
    flex-shrink: 0;
    transition: all 0.18s;
  }
  .choice-btn:hover:not(:disabled) {
    border-color: var(--gold);
    background: #fffbf0;
  }
  .choice-btn:hover:not(:disabled) .choice-label {
    background: var(--gold);
    color: white;
  }
  .choice-btn.correct {
    border-color: var(--correct);
    background: var(--correct-bg);
    color: var(--correct);
  }
  .choice-btn.correct .choice-label {
    background: var(--correct);
    color: white;
  }
  .choice-btn.wrong {
    border-color: var(--wrong);
    background: var(--wrong-bg);
    color: var(--wrong);
  }
  .choice-btn.wrong .choice-label {
    background: var(--wrong);
    color: white;
  }
  .choice-btn:disabled { cursor: default; }

  .feedback-box {
    background: var(--white);
    border-radius: 14px;
    padding: 20px 24px;
    box-shadow: var(--shadow);
    margin-bottom: 20px;
    display: none;
    border-left: 5px solid var(--correct);
  }
  .feedback-box.wrong { border-left-color: var(--wrong); }
  .feedback-box .fb-title {
    font-weight: 700;
    font-size: 1rem;
    margin-bottom: 8px;
  }
  .feedback-box.correct .fb-title { color: var(--correct); }
  .feedback-box.wrong .fb-title { color: var(--wrong); }
  .feedback-box .fb-body {
    font-size: 0.88rem;
    line-height: 1.8;
    color: var(--text);
  }
  .feedback-box .fb-point {
    margin-top: 10px;
    padding-top: 10px;
    border-top: 1px solid #e5e7eb;
    font-size: 0.82rem;
    color: var(--muted);
  }

  .btn-next {
    display: block;
    width: 100%;
    padding: 15px;
    background: var(--navy);
    color: var(--gold);
    border: none;
    border-radius: 12px;
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 1rem;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s ease;
    display: none;
  }
  .btn-next:hover {
    background: var(--navy2);
    transform: translateY(-2px);
    box-shadow: 0 4px 16px rgba(15,30,53,0.25);
  }

  /* ===== RESULT ===== */
  #result {
    max-width: 600px;
    margin: 0 auto;
    padding: 60px 24px 80px;
    text-align: center;
  }
  .result-circle {
    width: 160px;
    height: 160px;
    border-radius: 50%;
    background: var(--navy);
    margin: 0 auto 28px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    box-shadow: 0 8px 40px rgba(15,30,53,0.3);
  }
  .result-score {
    font-family: 'Noto Serif JP', serif;
    font-size: 2.8rem;
    color: var(--gold);
    font-weight: 700;
    line-height: 1;
  }
  .result-of { color: rgba(255,255,255,0.6); font-size: 0.8rem; margin-top: 4px; }

  .result-title {
    font-family: 'Noto Serif JP', serif;
    font-size: 1.5rem;
    color: var(--navy);
    margin-bottom: 10px;
  }
  .result-msg {
    color: var(--muted);
    font-size: 0.9rem;
    line-height: 1.8;
    margin-bottom: 32px;
  }

  .result-breakdown {
    background: var(--white);
    border-radius: 16px;
    padding: 20px 24px;
    box-shadow: var(--shadow);
    margin-bottom: 24px;
    text-align: left;
  }
  .breakdown-title {
    font-weight: 700;
    font-size: 0.85rem;
    color: var(--navy);
    margin-bottom: 14px;
    text-align: center;
    letter-spacing: 0.05em;
  }
  .breakdown-item {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 8px;
    font-size: 0.84rem;
  }
  .breakdown-item .bi-label { flex: 1; color: var(--text); }
  .breakdown-item .bi-val { font-weight: 700; color: var(--navy); min-width: 50px; text-align: right; }
  .breakdown-item .bi-bar {
    flex: 2;
    height: 8px;
    background: #e5e7eb;
    border-radius: 4px;
    overflow: hidden;
  }
  .bi-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--gold), var(--gold-light));
    border-radius: 4px;
  }

  .result-btns { display: flex; flex-direction: column; gap: 10px; }

  /* ===== SCENARIO BOX (ケース型) ===== */
  .scenario-box {
    background: #f0f4ff;
    border: 1px solid #c7d4f5;
    border-left: 4px solid #4a6cf7;
    border-radius: 10px;
    padding: 16px 18px;
    margin-bottom: 16px;
    font-size: 0.88rem;
    line-height: 1.9;
    color: #1e2a4a;
  }
  .scenario-box .sc-label {
    font-size: 0.72rem;
    font-weight: 700;
    color: #4a6cf7;
    letter-spacing: 0.1em;
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  /* 計算問題ヒント */
  .calc-hint {
    background: #fff8e8;
    border: 1px solid #f0d070;
    border-radius: 8px;
    padding: 10px 14px;
    font-size: 0.82rem;
    color: #7a5a00;
    margin-bottom: 14px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  /* 問題タイプバッジ */
  .type-badge {
    font-size: 0.7rem;
    font-weight: 700;
    padding: 3px 10px;
    border-radius: 20px;
    letter-spacing: 0.06em;
  }
  .type-badge.case  { background: #e8ecff; color: #4a6cf7; }
  .type-badge.calc  { background: #fff3cc; color: #9a6700; }
  .type-badge.trend { background: #e8f5e9; color: #2e7d32; }
  .type-badge.basic { background: #e8f5e9; color: #2e7d32; }

  /* ===== RESPONSIVE ===== */
  @media (max-width: 480px) {
    .hero h1 { font-size: 1.4rem; }
    .category-grid { grid-template-columns: 1fr 1fr; }
    .question-text { font-size: 0.97rem; }
  }
</style>
</head>
<body>

<header>
  <div>
    <div class="logo">📋 BM検定 学習アプリ</div>
    <div class="sub">BUSINESS MANAGER CERTIFICATION</div>
  </div>
  <div class="spacer"></div>
  <div class="score-badge" id="scoreBadge">📊 総合スコア: --</div>
</header>

<!-- ===== HOME ===== -->
<div id="home" class="screen active">
  <div class="hero">
    <h1>ビジネスマネージャー検定<br><span>合格への道</span></h1>
    <p>カテゴリ別に学んで、実力を確認しよう。<br>間違えた問題は復習モードで徹底的に克服！</p>
  </div>

  <p class="section-title">カテゴリを選んで学習する</p>
  <div class="category-grid" id="categoryGrid"></div>

  <button class="btn-all" onclick="startQuiz('all')">🎯 全カテゴリ混合チャレンジ</button>
  <button class="btn-review" id="btnReview" onclick="startQuiz('review')" style="display:none">🔁 間違えた問題だけ復習する (<span id="reviewCount">0</span>問)</button>
</div>

<!-- ===== QUIZ ===== -->
<div id="quiz" class="screen">
  <div class="quiz-header">
    <div class="quiz-meta">
      <span class="cat-tag" id="catTag"></span>
      <span class="type-badge" id="typeBadge" style="display:none"></span>
      <span class="q-counter" id="qCounter"></span>
    </div>
    <div class="progress-track">
      <div class="progress-fill-quiz" id="quizProgress" style="width:0%"></div>
    </div>
  </div>

  <div class="question-box">
    <div id="scenarioBox" class="scenario-box" style="display:none">
      <div class="sc-label">📋 シナリオ</div>
      <div id="scenarioText"></div>
    </div>
    <div id="calcHint" class="calc-hint" style="display:none">🧮 <span id="calcHintText"></span></div>
    <div class="question-text" id="questionText"></div>
  </div>

  <div class="choices" id="choices"></div>

  <div class="feedback-box" id="feedbackBox">
    <div class="fb-title" id="fbTitle"></div>
    <div class="fb-body" id="fbBody"></div>
    <div class="fb-point" id="fbPoint"></div>
  </div>

  <button class="btn-next" id="btnNext" onclick="nextQuestion()"></button>
</div>

<!-- ===== RESULT ===== -->
<div id="result" class="screen">
  <div class="result-circle">
    <div class="result-score" id="resScore"></div>
    <div class="result-of" id="resOf"></div>
  </div>
  <div class="result-title" id="resTitle"></div>
  <div class="result-msg" id="resMsg"></div>
  <div class="result-breakdown" id="resBreakdown"></div>
  <div class="result-btns">
    <button class="btn-all" onclick="goHome()">🏠 ホームに戻る</button>
    <button class="btn-review" id="btnResultReview" onclick="startQuiz('review')" style="display:none">🔁 間違えた問題を復習する</button>
  </div>
</div>

<script>
// =====================================================================
//  問題データベース
// =====================================================================
const QUESTIONS = [
  // ── マネジメントの基本 ──
  { id:1, cat:"マネジメントの基本",
    q:"PDCAサイクルの「C」が表すものはどれか。",
    choices:["計画（Plan）","実行（Do）","評価・確認（Check）","改善（Action）"],
    ans:2, exp:"PDCAはPlan（計画）→Do（実行）→Check（評価）→Action（改善）の順。Cは評価・確認フェーズで、実行結果を目標と照合します。" },

  { id:2, cat:"マネジメントの基本",
    q:"マズローの欲求5段階説において、最も高次の欲求はどれか。",
    choices:["安全の欲求","承認（尊重）の欲求","社会的欲求","自己実現の欲求"],
    ans:3, exp:"マズローは欲求を①生理的→②安全→③社会的（所属・愛情）→④承認→⑤自己実現の順で階層化。自己実現が最も高次です。" },

  { id:3, cat:"マネジメントの基本",
    q:"マネジメントにおける「スパン・オブ・コントロール」とは何を指すか。",
    choices:["管理者が直接管理できる部下の人数","プロジェクトの期間","権限委譲の範囲","意思決定の速さ"],
    ans:0, exp:"スパン・オブ・コントロール（管理の幅）とは、1人の管理者が直接・効率的に管理できる部下の最大人数のこと。組織設計の重要な概念です。" },

  { id:4, cat:"マネジメントの基本",
    q:"目標による管理（MBO）を提唱したのは誰か。",
    choices:["フレデリック・テイラー","ピーター・ドラッカー","ヘンリー・フェイヨール","ダグラス・マクレガー"],
    ans:1, exp:"MBO（Management by Objectives）はドラッカーが1954年著書『現代の経営』で提唱。上司と部下が共同で目標を設定し、達成度で評価します。" },

  { id:5, cat:"マネジメントの基本",
    q:"OJT（On-the-Job Training）の説明として正しいものはどれか。",
    choices:["外部研修機関での座学中心の研修","職場外でのロールプレイング研修","eラーニングによる自己学習","実際の業務を通じて行う職場内訓練"],
    ans:3, exp:"OJTは職場内で実際の業務を通じて上司・先輩が指導する育成手法。即戦力化に適しており、Off-JT（職場外研修）と組み合わせて活用します。" },

  // ── 人材育成・労務管理 ──
  { id:6, cat:"人材育成・労務管理",
    q:"フィードバックの「SBI」フレームワークのSが指すものはどれか。",
    choices:["スキル（Skill）","成果（Success）","スコープ（Scope）","状況（Situation）"],
    ans:3, exp:"SBIはSituation（状況）・Behavior（行動）・Impact（影響）の頭文字。具体的な状況を示しながら行動とその影響を伝える効果的なフィードバック手法です。" },

  { id:7, cat:"人材育成・労務管理",
    q:"労働基準法上、法定労働時間の原則はどれか。",
    choices:["1日7時間、1週40時間","1日8時間、1週40時間","1日8時間、1週44時間","1日9時間、1週45時間"],
    ans:1, exp:"労働基準法第32条により、法定労働時間は1日8時間・1週40時間が原則。これを超える場合は36協定（時間外労働協定）の締結が必要です。" },

  { id:8, cat:"人材育成・労務管理",
    q:"コーチングで重視される傾聴スキルの説明として最も適切なものはどれか。",
    choices:["相手の話を最後まで聞き、感情も含めて理解する","相手の話を遮ってアドバイスを伝える","自分の経験を中心に話す","問題点を即座に指摘する"],
    ans:0, exp:"傾聴（アクティブ・リスニング）は相手の言葉・感情・意図を深く理解すること。コーチングでは質問と傾聴を組み合わせて相手の自発的な気づきを促します。" },

  { id:9, cat:"人材育成・労務管理",
    q:"ハラスメント防止の観点から、パワーハラスメントの要件に含まれないものはどれか。",
    choices:["優越的な関係を背景にした言動","業務上必要かつ相当な範囲を超えた言動","労働者の就業環境が害されること","上司への反論・意見表明"],

// =====================================================================
//  状態管理
// =====================================================================
let state = {
  queue: [],
  idx: 0,
  score: 0,
  wrong: new Set(), // 間違えた問題ID
  catFilter: 'all',
  answered: {}, // {id: bool} 正誤記録
  catStats: {} // {カテゴリ: {total, correct}}
};

// =====================================================================
//  カテゴリ一覧
// =====================================================================
const CATS = [...new Set(QUESTIONS.map(q=>q.cat))];
const CAT_ICONS = {
  "マネジメントの基本": "🎯",
  "人材育成・労務管理": "👥",
  "業務管理・組織運営": "⚙️",
  "コンプライアンス・リスク管理": "🛡️",
  "マーケティング": "📊",
  "財務・数値管理": "💰",
  "リーダーシップ": "🌟",
  "損益分岐点・財務計算": "🧮",
  "労務管理（法令数値）": "⚖️",
  "戦略フレームワーク": "♟️",
  "多様性・働き方改革": "🌈",
  "ケース型問題": "💼",
  "ESG・SDGs・DX": "🌍"
};

// =====================================================================
//  初期化
// =====================================================================
function init() {
  // catStats初期化
  CATS.forEach(c => {
    const qs = QUESTIONS.filter(q=>q.cat===c);
    state.catStats[c] = state.catStats[c] || {total: qs.length, correct: 0};
  });
  renderHome();
}

function renderHome() {
  const grid = document.getElementById('categoryGrid');
  grid.innerHTML = '';
  CATS.forEach(cat => {
    const qs = QUESTIONS.filter(q=>q.cat===cat);
    const st = state.catStats[cat] || {total:qs.length, correct:0};
    // answered in this cat
    const answeredCount = qs.filter(q=>state.answered[q.id]!==undefined).length;
    const pct = qs.length ? Math.round(answeredCount/qs.length*100) : 0;
    const correctPct = answeredCount ? Math.round(st.correct/qs.length*100) : 0;

    const card = document.createElement('div');
    card.className = 'cat-card';
    card.innerHTML = `
      <div class="icon">${CAT_ICONS[cat]||'📌'}</div>
      <div class="name">${cat}</div>
      <div class="count">${qs.length}問 ／ 正解率 ${correctPct}%</div>
      <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
    `;
    card.onclick = () => startQuiz(cat);
    grid.appendChild(card);
  });

  // 復習ボタン
  const wc = state.wrong.size;
  document.getElementById('reviewCount').textContent = wc;
  document.getElementById('btnReview').style.display = wc > 0 ? 'block' : 'none';
}

// =====================================================================
//  クイズ開始
// =====================================================================
function startQuiz(filter) {
  state.catFilter = filter;
  let pool;
  if (filter === 'all') {
    pool = [...QUESTIONS];
  } else if (filter === 'review') {
    pool = QUESTIONS.filter(q => state.wrong.has(q.id));
    if (pool.length === 0) { alert('復習問題がありません！'); return; }
    state.wrong.clear(); // リセット
  } else {
    pool = QUESTIONS.filter(q => q.cat === filter);
  }
  // シャッフル
  pool = pool.sort(() => Math.random()-0.5);
  state.queue = pool;
  state.idx = 0;
  state.score = 0;
  showScreen('quiz');
  renderQuestion();
}

// =====================================================================
//  問題描画
// =====================================================================
function renderQuestion() {
  const q = state.queue[state.idx];
  const total = state.queue.length;
  const pct = Math.round(state.idx/total*100);

  document.getElementById('catTag').textContent = CAT_ICONS[q.cat]+' '+q.cat;
  document.getElementById('qCounter').textContent = `問${state.idx+1} / ${total}`;
  document.getElementById('quizProgress').style.width = pct+'%';
  document.getElementById('questionText').textContent = q.q;

  // タイプバッジ
  const badge = document.getElementById('typeBadge');
  const typeMap = { case:'💼 ケース型', calc:'🧮 計算問題', law:'⚖️ 法令数値', trend:'🌍 時事・トレンド' };
  if (q.type && typeMap[q.type]) {
    badge.textContent = typeMap[q.type];
    badge.className = 'type-badge ' + q.type;
    badge.style.display = 'inline-flex';
  } else {
    badge.style.display = 'none';
  }

  // シナリオ表示（ケース型）
  const scBox = document.getElementById('scenarioBox');
  const scText = document.getElementById('scenarioText');
  if (q.scenario) {
    scText.textContent = q.scenario;
    scBox.style.display = 'block';
  } else {
    scBox.style.display = 'none';
  }

  // 計算ヒント表示
  const chint = document.getElementById('calcHint');
  const chintTxt = document.getElementById('calcHintText');
  if (q.calcHint) {
    chintTxt.textContent = q.calcHint;
    chint.style.display = 'flex';
  } else {
    chint.style.display = 'none';
  }

  // 選択肢
  const choicesEl = document.getElementById('choices');
  choicesEl.innerHTML = '';
  const labels = ['Ａ','Ｂ','Ｃ','Ｄ'];
  q.choices.forEach((c,i) => {
    const btn = document.createElement('button');
    btn.className = 'choice-btn';
    btn.innerHTML = `<span class="choice-label">${labels[i]}</span><span>${c}</span>`;
    btn.onclick = () => answer(i, q);
    choicesEl.appendChild(btn);
  });

  // フィードバックリセット
  const fb = document.getElementById('feedbackBox');
  fb.style.display = 'none';
  fb.className = 'feedback-box';

  const btnNext = document.getElementById('btnNext');
  btnNext.style.display = 'none';
}

// =====================================================================
//  解答処理
// =====================================================================
function answer(chosen, q) {
  // 全ボタン無効化
  document.querySelectorAll('.choice-btn').forEach((btn,i) => {
    btn.disabled = true;
    if (i === q.ans) btn.classList.add('correct');
    else if (i === chosen && chosen !== q.ans) btn.classList.add('wrong');
  });

  const correct = chosen === q.ans;
  if (correct) {
    state.score++;
    // catStats
    if (!state.catStats[q.cat]) state.catStats[q.cat] = {total:0, correct:0};
    state.catStats[q.cat].correct = (state.catStats[q.cat].correct||0) + 1;
  } else {
    state.wrong.add(q.id);
  }
  state.answered[q.id] = correct;

  // フィードバック
  const fb = document.getElementById('feedbackBox');
  fb.style.display = 'block';
  fb.className = 'feedback-box ' + (correct ? 'correct' : 'wrong');
  document.getElementById('fbTitle').textContent = correct ? '✅ 正解！' : '❌ 不正解…';
  document.getElementById('fbBody').textContent = q.exp;
  document.getElementById('fbPoint').textContent = `正解：${['Ａ','Ｂ','Ｃ','Ｄ'][q.ans]}．${q.choices[q.ans]}`;

  // 次へボタン
  const btnNext = document.getElementById('btnNext');
  btnNext.style.display = 'block';
  const isLast = state.idx >= state.queue.length - 1;
  btnNext.textContent = isLast ? '📊 結果を見る →' : '次の問題へ →';
}

// =====================================================================
//  次へ
// =====================================================================
function nextQuestion() {
  state.idx++;
  if (state.idx >= state.queue.length) {
    showResult();
  } else {
    renderQuestion();
  }
}

// =====================================================================
//  結果
// =====================================================================
function showResult() {
  showScreen('result');
  const total = state.queue.length;
  const pct = Math.round(state.score/total*100);

  document.getElementById('resScore').textContent = state.score;
  document.getElementById('resOf').textContent = `/ ${total}問`;

  let title, msg;
  if (pct >= 90) { title='🏆 優秀！'; msg='ほぼ完璧な理解です。自信を持って本番に臨みましょう！'; }
  else if (pct >= 70) { title='👍 合格ライン！'; msg='良いスコアです。苦手カテゴリを復習でさらに磤き上げましょう。'; }
  else if (pct >= 50) { title='📚 もう一息！'; msg='基礎は身についています。間違えた問題を中心に繰り返し学習しましょう。'; }
  else { title='💪 頑張れ！'; msg='まだまだ伸びしろがあります！復習モードで弱点を克服しましょう。'; }

  document.getElementById('resTitle').textContent = title;
  document.getElementById('resMsg').textContent = msg;

  // カテゴリ別内訳
  const bd = document.getElementById('resBreakdown');
  const cats = [...new Set(state.queue.map(q=>q.cat))];
  let html = '<div class="breakdown-title">カテゴリ別 正解率</div>';
  cats.forEach(cat => {
    const catQs = state.queue.filter(q=>q.cat===cat);
    const catCorrect = catQs.filter(q=>state.answered[q.id]===true).length;
    const catPct = catQs.length ? Math.round(catCorrect/catQs.length*100) : 0;
    html += `<div class="breakdown-item">
      <span class="bi-label">${CAT_ICONS[cat]||''} ${cat}</span>
      <div class="bi-bar"><div class="bi-bar-fill" style="width:${catPct}%"></div></div>
      <span class="bi-val">${catCorrect}/${catQs.length}</span>
    </div>`;
  });
  bd.innerHTML = html;

  const wc = state.wrong.size;
  const btnRR = document.getElementById('btnResultReview');
  btnRR.style.display = wc > 0 ? 'block' : 'none';
  if (wc > 0) btnRR.textContent = `🔁 間違えた${wc}問を復習する`;
}

// =====================================================================
//  ユーティリティ
// =====================================================================
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function goHome() {
  renderHome();
  showScreen('home');
}

init();
</script>
</body>
</html>
